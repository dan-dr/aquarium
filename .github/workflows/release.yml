name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate signing credentials
        if: env.CERTIFICATE_P12 != ''
        run: |
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$CODESIGN_IDENTITY"
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_PASSWORD"

      - name: Import Developer ID certificate
        if: env.CERTIFICATE_P12 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/aquarium.keychain-db"
          PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$PASSWORD" "$KEYCHAIN"
          printf '%s' "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN" \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$PASSWORD" "$KEYCHAIN"

      - name: Build release
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          chmod +x script/*.sh script/generate_icon.swift
          VERSION="$VERSION" ./script/package_release.sh

      - name: Notarize and staple
        if: env.CERTIFICATE_P12 != ''
        run: |
          ARCHIVE="$(find dist -name 'Aquarium-*.zip' -print -quit)"
          xcrun notarytool submit "$ARCHIVE" --wait \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"
          xcrun stapler staple dist/Aquarium.app
          ditto -c -k --sequesterRsrc --keepParent dist/Aquarium.app "$ARCHIVE"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/Aquarium-*.zip \
            --generate-notes --title "Aquarium ${GITHUB_REF_NAME}"
